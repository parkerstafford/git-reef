<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Reef — Bioluminescent Repository Visualization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'SF Pro Display';
            src: local('SF Pro Display'), local('SFProDisplay-Regular'), local('-apple-system');
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
        }

        .ui-overlay {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }

        .header {
            top: 0;
            left: 0;
            right: 0;
            padding: 32px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00f5d4 0%, #7b2cbf 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.4);
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .repo-info {
            text-align: right;
            opacity: 0.8;
        }

        .repo-name {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .repo-stats {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }

        .stats-panel {
            bottom: 32px;
            left: 40px;
            display: flex;
            gap: 32px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #00f5d4 0%, #00bbf9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.4);
        }

        .legend {
            bottom: 32px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: flex-end;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        .tooltip {
            position: fixed;
            z-index: 100;
            background: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 20px;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            max-width: 280px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tooltip-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00f5d4, #7b2cbf);
        }

        .tooltip-meta {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
        }

        .tooltip-commits {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #030712 0%, #0a0f1e 50%, #0d1525 100%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-coral {
            width: 60px;
            height: 60px;
            position: relative;
        }

        .loading-coral::before,
        .loading-coral::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .loading-coral::before {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 245, 212, 0.4) 0%, transparent 70%);
        }

        .loading-coral::after {
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
            background: radial-gradient(circle, rgba(123, 44, 191, 0.6) 0%, transparent 70%);
            animation-delay: 0.5s;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        .loading-text {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            letter-spacing: 0.05em;
        }

        .depth-indicator {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: none;
        }

        .depth-line {
            width: 1px;
            height: 120px;
            background: linear-gradient(180deg, rgba(0, 245, 212, 0.6) 0%, rgba(123, 44, 191, 0.6) 50%, rgba(255, 107, 107, 0.6) 100%);
            border-radius: 1px;
        }

        .depth-label {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }

        .controls {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 8px;
            pointer-events: all;
        }

        .control-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 16px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(10px);
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.15);
            color: #fff;
        }

        .control-btn.active {
            background: rgba(0, 245, 212, 0.2);
            border-color: rgba(0, 245, 212, 0.4);
            color: #00f5d4;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 5;
            background: radial-gradient(ellipse at center, transparent 0%, transparent 50%, rgba(0,0,0,0.4) 100%);
        }

        .caustics {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 2;
            opacity: 0.03;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.015' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            animation: caustics 20s linear infinite;
        }

        @keyframes caustics {
            0% { transform: translate(0, 0) scale(1.5); }
            50% { transform: translate(-5%, -5%) scale(1.5); }
            100% { transform: translate(0, 0) scale(1.5); }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading">
        <div class="loading-coral"></div>
        <div class="loading-text">Descending into the reef...</div>
    </div>

    <div id="canvas-container"></div>
    
    <div class="caustics"></div>
    <div class="vignette"></div>

    <div class="ui-overlay header">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <span class="logo-text">Git Reef</span>
        </div>
        <div class="repo-info">
            <div class="repo-name" id="repo-name">sample-repository</div>
            <div class="repo-stats" id="repo-stats">Visualizing commit history</div>
        </div>
    </div>

    <div class="ui-overlay stats-panel">
        <div class="stat-item">
            <span class="stat-value" id="stat-contributors">8</span>
            <span class="stat-label">Contributors</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-commits">247</span>
            <span class="stat-label">Commits</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-branches">12</span>
            <span class="stat-label">Branches</span>
        </div>
    </div>

    <div class="ui-overlay legend">
        <div class="legend-item">
            <span>Coral Formation</span>
            <span class="legend-dot" style="background: #00f5d4; color: #00f5d4;"></span>
        </div>
        <div class="legend-item">
            <span>Swimming Commit</span>
            <span class="legend-dot" style="background: #f72585; color: #f72585;"></span>
        </div>
        <div class="legend-item">
            <span>Merge Burst</span>
            <span class="legend-dot" style="background: #7b2cbf; color: #7b2cbf;"></span>
        </div>
    </div>

    <div class="depth-indicator">
        <span class="depth-label">Recent</span>
        <div class="depth-line"></div>
        <span class="depth-label">Ancient</span>
    </div>

    <div class="controls">
        <button class="control-btn active" data-view="orbit">Orbit</button>
        <button class="control-btn" data-view="flythrough">Flythrough</button>
        <button class="control-btn" data-view="top">Top View</button>
    </div>

    <div class="tooltip" id="tooltip">
        <div class="tooltip-title">
            <div class="tooltip-avatar"></div>
            <span id="tooltip-name">Contributor Name</span>
        </div>
        <div class="tooltip-meta" id="tooltip-meta">
            First commit: Jan 2024<br>
            Most active: src/components/
        </div>
        <div class="tooltip-commits" id="tooltip-commits">
            142 commits · 12,847 additions · 3,291 deletions
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Sample git data - in production this would come from git log parsing
        const sampleRepoData = {
            name: "awesome-project",
            contributors: [
                { name: "Sarah Chen", commits: 142, color: "#00f5d4", additions: 12847, deletions: 3291, firstCommit: "2024-01-15", areas: ["src/core/", "lib/"] },
                { name: "Marcus Webb", commits: 98, color: "#00bbf9", additions: 8932, deletions: 2103, firstCommit: "2024-02-03", areas: ["api/", "tests/"] },
                { name: "Aisha Patel", commits: 87, color: "#7b2cbf", additions: 7654, deletions: 1876, firstCommit: "2024-01-20", areas: ["frontend/", "styles/"] },
                { name: "Jake Morrison", commits: 76, color: "#f72585", additions: 6543, deletions: 1654, firstCommit: "2024-03-01", areas: ["docs/", "examples/"] },
                { name: "Elena Vasquez", commits: 63, color: "#ff6b6b", additions: 5432, deletions: 987, firstCommit: "2024-02-15", areas: ["utils/", "helpers/"] },
                { name: "David Kim", commits: 52, color: "#4ecdc4", additions: 4321, deletions: 876, firstCommit: "2024-03-10", areas: ["config/", "scripts/"] },
                { name: "Priya Singh", commits: 41, color: "#a78bfa", additions: 3210, deletions: 654, firstCommit: "2024-04-01", areas: ["components/", "hooks/"] },
                { name: "Tom Anderson", commits: 29, color: "#fbbf24", additions: 2109, deletions: 432, firstCommit: "2024-04-15", areas: ["build/", "ci/"] }
            ],
            mergeCommits: 34,
            branches: 12
        };

        class GitReef {
            constructor() {
                this.container = document.getElementById('canvas-container');
                this.tooltip = document.getElementById('tooltip');
                this.mouse = new THREE.Vector2();
                this.raycaster = new THREE.Raycaster();
                this.corals = [];
                this.fish = [];
                this.particles = [];
                this.clock = new THREE.Clock();
                this.currentView = 'orbit';
                
                this.init();
                this.createEnvironment();
                this.createCorals();
                this.createFish();
                this.createParticles();
                this.createSandParticles();
                this.setupEventListeners();
                this.animate();
                
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 2000);

                this.updateStats();
            }

            init() {
                // Scene
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x030712, 0.015);

                // Camera
                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.set(0, 15, 40);

                // Renderer
                this.renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true,
                    powerPreference: "high-performance"
                });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                this.container.appendChild(this.renderer.domElement);

                // Controls
                this.controls = new OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxPolarAngle = Math.PI * 0.85;
                this.controls.minDistance = 10;
                this.controls.maxDistance = 100;
                this.controls.autoRotate = true;
                this.controls.autoRotateSpeed = 0.3;

                // Post-processing
                this.composer = new EffectComposer(this.renderer);
                this.composer.addPass(new RenderPass(this.scene, this.camera));
                
                const bloomPass = new UnrealBloomPass(
                    new THREE.Vector2(window.innerWidth, window.innerHeight),
                    1.5,  // strength
                    0.4,  // radius
                    0.85  // threshold
                );
                this.composer.addPass(bloomPass);
            }

            createEnvironment() {
                // Ocean floor
                const floorGeometry = new THREE.PlaneGeometry(200, 200, 100, 100);
                const floorMaterial = new THREE.MeshStandardMaterial({
                    color: 0x0a1628,
                    roughness: 0.9,
                    metalness: 0.1,
                });
                
                // Add some displacement to vertices for sand dunes
                const positions = floorGeometry.attributes.position;
                for (let i = 0; i < positions.count; i++) {
                    const x = positions.getX(i);
                    const y = positions.getY(i);
                    positions.setZ(i, Math.sin(x * 0.1) * Math.cos(y * 0.1) * 2 + Math.random() * 0.5);
                }
                floorGeometry.computeVertexNormals();
                
                const floor = new THREE.Mesh(floorGeometry, floorMaterial);
                floor.rotation.x = -Math.PI / 2;
                floor.position.y = -5;
                this.scene.add(floor);

                // Ambient light (very dim, deep ocean)
                const ambientLight = new THREE.AmbientLight(0x1a1a3a, 0.3);
                this.scene.add(ambientLight);

                // Subtle directional light from above (moonlight filtering through)
                const moonLight = new THREE.DirectionalLight(0x4a5568, 0.2);
                moonLight.position.set(0, 50, 0);
                this.scene.add(moonLight);

                // Background gradient
                const bgCanvas = document.createElement('canvas');
                bgCanvas.width = 2;
                bgCanvas.height = 512;
                const bgCtx = bgCanvas.getContext('2d');
                const gradient = bgCtx.createLinearGradient(0, 0, 0, 512);
                gradient.addColorStop(0, '#030712');
                gradient.addColorStop(0.3, '#0a0f1e');
                gradient.addColorStop(0.6, '#0d1525');
                gradient.addColorStop(1, '#0f172a');
                bgCtx.fillStyle = gradient;
                bgCtx.fillRect(0, 0, 2, 512);
                
                const bgTexture = new THREE.CanvasTexture(bgCanvas);
                this.scene.background = bgTexture;
            }

            createCoralBranch(height, radius, segments, color) {
                const points = [];
                const radiusVariation = [];
                
                for (let i = 0; i <= segments; i++) {
                    const t = i / segments;
                    const y = t * height;
                    const wave = Math.sin(t * Math.PI * 3) * 0.3;
                    points.push(new THREE.Vector3(wave, y, 0));
                    radiusVariation.push(radius * (1 - t * 0.7) * (0.8 + Math.random() * 0.4));
                }

                const curve = new THREE.CatmullRomCurve3(points);
                const geometry = new THREE.TubeGeometry(curve, segments * 2, radius * 0.5, 8, false);
                
                const material = new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.4,
                    roughness: 0.6,
                    metalness: 0.2,
                });

                return new THREE.Mesh(geometry, material);
            }

            createCoral(contributor, index, total) {
                const group = new THREE.Group();
                
                // Position corals in a circular arrangement
                const angle = (index / total) * Math.PI * 2;
                const radius = 15 + Math.random() * 10;
                group.position.x = Math.cos(angle) * radius;
                group.position.z = Math.sin(angle) * radius;
                group.position.y = -5;

                const color = new THREE.Color(contributor.color);
                const baseHeight = 3 + (contributor.commits / 30);
                const branchCount = Math.min(5 + Math.floor(contributor.commits / 20), 12);

                // Create main coral structure
                for (let i = 0; i < branchCount; i++) {
                    const branchAngle = (i / branchCount) * Math.PI * 2 + Math.random() * 0.5;
                    const branchHeight = baseHeight * (0.5 + Math.random() * 0.5);
                    const branch = this.createCoralBranch(branchHeight, 0.3, 10, color);
                    
                    branch.position.x = Math.cos(branchAngle) * (0.5 + Math.random());
                    branch.position.z = Math.sin(branchAngle) * (0.5 + Math.random());
                    branch.rotation.x = (Math.random() - 0.5) * 0.5;
                    branch.rotation.z = (Math.random() - 0.5) * 0.5;
                    
                    group.add(branch);

                    // Add sub-branches
                    if (Math.random() > 0.5) {
                        const subBranch = this.createCoralBranch(branchHeight * 0.4, 0.15, 6, color);
                        subBranch.position.y = branchHeight * 0.6;
                        subBranch.position.x = Math.cos(branchAngle) * 0.3;
                        subBranch.rotation.z = branchAngle + Math.PI / 4;
                        branch.add(subBranch);
                    }
                }

                // Add point light for glow
                const light = new THREE.PointLight(color, 2, 15);
                light.position.y = baseHeight / 2;
                group.add(light);

                // Store contributor data for interaction
                group.userData = {
                    type: 'coral',
                    contributor: contributor,
                    baseY: group.position.y,
                    phase: Math.random() * Math.PI * 2
                };

                this.corals.push(group);
                this.scene.add(group);
            }

            createCorals() {
                sampleRepoData.contributors.forEach((contributor, index) => {
                    this.createCoral(contributor, index, sampleRepoData.contributors.length);
                });
            }

            createFish() {
                const fishGeometry = new THREE.ConeGeometry(0.15, 0.5, 4);
                fishGeometry.rotateX(Math.PI / 2);

                sampleRepoData.contributors.forEach((contributor) => {
                    const fishCount = Math.min(Math.floor(contributor.commits / 10), 15);
                    const color = new THREE.Color(contributor.color);

                    for (let i = 0; i < fishCount; i++) {
                        const material = new THREE.MeshStandardMaterial({
                            color: color,
                            emissive: color,
                            emissiveIntensity: 0.8,
                            transparent: true,
                            opacity: 0.9,
                        });

                        const fish = new THREE.Mesh(fishGeometry, material);
                        
                        // Random starting position
                        fish.position.x = (Math.random() - 0.5) * 60;
                        fish.position.y = Math.random() * 15 - 2;
                        fish.position.z = (Math.random() - 0.5) * 60;

                        fish.userData = {
                            type: 'fish',
                            velocity: new THREE.Vector3(
                                (Math.random() - 0.5) * 0.1,
                                (Math.random() - 0.5) * 0.02,
                                (Math.random() - 0.5) * 0.1
                            ),
                            contributor: contributor,
                            phase: Math.random() * Math.PI * 2,
                            speed: 0.5 + Math.random() * 0.5
                        };

                        // Add small glow
                        const glowGeometry = new THREE.SphereGeometry(0.3, 8, 8);
                        const glowMaterial = new THREE.MeshBasicMaterial({
                            color: color,
                            transparent: true,
                            opacity: 0.3,
                        });
                        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                        fish.add(glow);

                        this.fish.push(fish);
                        this.scene.add(fish);
                    }
                });
            }

            createParticles() {
                // Bioluminescent particles floating in water
                const particleCount = 2000;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                const colors = new Float32Array(particleCount * 3);
                const sizes = new Float32Array(particleCount);

                const colorPalette = [
                    new THREE.Color('#00f5d4'),
                    new THREE.Color('#00bbf9'),
                    new THREE.Color('#7b2cbf'),
                    new THREE.Color('#f72585'),
                    new THREE.Color('#4ecdc4'),
                ];

                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 100;
                    positions[i * 3 + 1] = Math.random() * 30 - 5;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 100;

                    const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                    colors[i * 3] = color.r;
                    colors[i * 3 + 1] = color.g;
                    colors[i * 3 + 2] = color.b;

                    sizes[i] = Math.random() * 2 + 0.5;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

                const material = new THREE.PointsMaterial({
                    size: 0.5,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending,
                    sizeAttenuation: true,
                });

                this.particleSystem = new THREE.Points(geometry, material);
                this.scene.add(this.particleSystem);
            }

            createSandParticles() {
                // Particles settling on the ocean floor (deleted code fading)
                const sandCount = 500;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(sandCount * 3);

                for (let i = 0; i < sandCount; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 80;
                    positions[i * 3 + 1] = -4.5 + Math.random() * 0.5;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 80;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                const material = new THREE.PointsMaterial({
                    size: 0.3,
                    color: 0x2a3f5f,
                    transparent: true,
                    opacity: 0.4,
                    blending: THREE.AdditiveBlending,
                });

                this.sandParticles = new THREE.Points(geometry, material);
                this.scene.add(this.sandParticles);
            }

            createMergeBurst(position) {
                const burstGroup = new THREE.Group();
                burstGroup.position.copy(position);

                const particleCount = 50;
                const colors = ['#7b2cbf', '#f72585', '#00f5d4'];

                for (let i = 0; i < particleCount; i++) {
                    const geometry = new THREE.SphereGeometry(0.1, 8, 8);
                    const material = new THREE.MeshBasicMaterial({
                        color: colors[Math.floor(Math.random() * colors.length)],
                        transparent: true,
                        opacity: 1,
                    });
                    const particle = new THREE.Mesh(geometry, material);
                    
                    particle.userData = {
                        velocity: new THREE.Vector3(
                            (Math.random() - 0.5) * 0.3,
                            (Math.random() - 0.5) * 0.3,
                            (Math.random() - 0.5) * 0.3
                        ),
                        life: 1,
                    };

                    burstGroup.add(particle);
                }

                this.scene.add(burstGroup);
                
                // Animate and remove
                const animateBurst = () => {
                    let allDead = true;
                    burstGroup.children.forEach(particle => {
                        particle.position.add(particle.userData.velocity);
                        particle.userData.velocity.multiplyScalar(0.95);
                        particle.userData.life -= 0.02;
                        particle.material.opacity = particle.userData.life;
                        particle.scale.setScalar(particle.userData.life);
                        if (particle.userData.life > 0) allDead = false;
                    });

                    if (allDead) {
                        this.scene.remove(burstGroup);
                    } else {
                        requestAnimationFrame(animateBurst);
                    }
                };
                animateBurst();
            }

            setupEventListeners() {
                window.addEventListener('resize', () => this.onResize());
                window.addEventListener('mousemove', (e) => this.onMouseMove(e));
                
                // Control buttons
                document.querySelectorAll('.control-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.setView(e.target.dataset.view);
                    });
                });

                // Periodic merge bursts for demo
                setInterval(() => {
                    if (Math.random() > 0.7) {
                        const coral = this.corals[Math.floor(Math.random() * this.corals.length)];
                        if (coral) {
                            const pos = coral.position.clone();
                            pos.y += 5;
                            this.createMergeBurst(pos);
                        }
                    }
                }, 3000);
            }

            setView(view) {
                this.currentView = view;
                this.controls.autoRotate = view === 'orbit';

                const duration = 1500;
                const start = performance.now();
                const startPos = this.camera.position.clone();
                const startTarget = this.controls.target.clone();

                let endPos, endTarget;

                switch(view) {
                    case 'orbit':
                        endPos = new THREE.Vector3(0, 15, 40);
                        endTarget = new THREE.Vector3(0, 0, 0);
                        break;
                    case 'flythrough':
                        endPos = new THREE.Vector3(30, 5, 0);
                        endTarget = new THREE.Vector3(-10, 0, 0);
                        break;
                    case 'top':
                        endPos = new THREE.Vector3(0, 50, 0.1);
                        endTarget = new THREE.Vector3(0, 0, 0);
                        break;
                }

                const animateCamera = () => {
                    const elapsed = performance.now() - start;
                    const t = Math.min(elapsed / duration, 1);
                    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

                    this.camera.position.lerpVectors(startPos, endPos, ease);
                    this.controls.target.lerpVectors(startTarget, endTarget, ease);

                    if (t < 1) requestAnimationFrame(animateCamera);
                };
                animateCamera();
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.composer.setSize(window.innerWidth, window.innerHeight);
            }

            onMouseMove(event) {
                this.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                this.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

                this.raycaster.setFromCamera(this.mouse, this.camera);
                
                const coralMeshes = [];
                this.corals.forEach(coral => {
                    coral.traverse(child => {
                        if (child.isMesh) {
                            child.userData.parentCoral = coral;
                            coralMeshes.push(child);
                        }
                    });
                });

                const intersects = this.raycaster.intersectObjects(coralMeshes);

                if (intersects.length > 0) {
                    const coral = intersects[0].object.userData.parentCoral;
                    if (coral && coral.userData.contributor) {
                        const contributor = coral.userData.contributor;
                        
                        document.getElementById('tooltip-name').textContent = contributor.name;
                        document.getElementById('tooltip-meta').innerHTML = 
                            `First commit: ${new Date(contributor.firstCommit).toLocaleDateString('en-US', { month: 'short', year: 'numeric' })}<br>` +
                            `Most active: ${contributor.areas.join(', ')}`;
                        document.getElementById('tooltip-commits').textContent = 
                            `${contributor.commits} commits · ${contributor.additions.toLocaleString()} additions · ${contributor.deletions.toLocaleString()} deletions`;
                        
                        this.tooltip.style.left = event.clientX + 20 + 'px';
                        this.tooltip.style.top = event.clientY + 20 + 'px';
                        this.tooltip.classList.add('visible');
                    }
                } else {
                    this.tooltip.classList.remove('visible');
                }
            }

            updateStats() {
                const totalCommits = sampleRepoData.contributors.reduce((sum, c) => sum + c.commits, 0);
                document.getElementById('stat-contributors').textContent = sampleRepoData.contributors.length;
                document.getElementById('stat-commits').textContent = totalCommits;
                document.getElementById('stat-branches').textContent = sampleRepoData.branches;
                document.getElementById('repo-name').textContent = sampleRepoData.name;
            }

            animate() {
                requestAnimationFrame(() => this.animate());

                const time = this.clock.getElapsedTime();

                // Animate corals (gentle swaying)
                this.corals.forEach(coral => {
                    const phase = coral.userData.phase;
                    coral.rotation.x = Math.sin(time * 0.5 + phase) * 0.02;
                    coral.rotation.z = Math.cos(time * 0.3 + phase) * 0.02;
                    
                    // Subtle pulsing glow
                    coral.children.forEach(child => {
                        if (child.isPointLight) {
                            child.intensity = 2 + Math.sin(time * 2 + phase) * 0.5;
                        }
                    });
                });

                // Animate fish (swimming behavior)
                this.fish.forEach(fish => {
                    const data = fish.userData;
                    
                    // Add some wave motion
                    data.velocity.y += Math.sin(time * 2 + data.phase) * 0.001;
                    
                    // Flocking-lite: slight attraction to center, avoid edges
                    if (fish.position.length() > 40) {
                        data.velocity.add(fish.position.clone().normalize().multiplyScalar(-0.002));
                    }

                    // Random direction changes
                    if (Math.random() > 0.99) {
                        data.velocity.x += (Math.random() - 0.5) * 0.05;
                        data.velocity.z += (Math.random() - 0.5) * 0.05;
                    }

                    // Clamp velocity
                    data.velocity.clampLength(0, 0.15);

                    // Apply movement
                    fish.position.add(data.velocity.clone().multiplyScalar(data.speed));

                    // Keep in bounds
                    fish.position.y = THREE.MathUtils.clamp(fish.position.y, -3, 15);

                    // Face direction of travel
                    if (data.velocity.length() > 0.01) {
                        fish.lookAt(fish.position.clone().add(data.velocity));
                    }

                    // Tail wiggle
                    fish.rotation.z = Math.sin(time * 10 + data.phase) * 0.1;
                });

                // Animate particles
                if (this.particleSystem) {
                    const positions = this.particleSystem.geometry.attributes.position.array;
                    for (let i = 0; i < positions.length; i += 3) {
                        positions[i + 1] += Math.sin(time + i) * 0.002;
                        positions[i] += Math.cos(time * 0.5 + i) * 0.001;
                    }
                    this.particleSystem.geometry.attributes.position.needsUpdate = true;
                    this.particleSystem.rotation.y = time * 0.01;
                }

                this.controls.update();
                this.composer.render();
            }
        }

        // Initialize
        new GitReef();
    </script>
</body>
</html>
